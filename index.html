<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sovereign Risk Dashboard</title>
  <link rel="stylesheet" href="src/styles/styles.css" />
</head>
<body>

  <header>
    <h1>Sovereign Risk Dashboard</h1>
  </header>

  <main>

    <!-- Country Selector -->
    <section id="controls">
      <label for="country-select">Select Country:</label>
      <select id="country-select">
        <option value="UK">United Kingdom</option>
        <option value="US">United States</option>
        <option value="DE">Germany</option>
      </select>

      <p id="selected-country-display">Showing data for: United Kingdom</p>
    </section>
    

    <!-- KPI Cards -->
    <section id="kpis">
      
      <div class="card">
        <h3>Inflation</h3>
        <p id="inflation-value">--</p>
      </div>

      <div class="card">
        <h3>Interest Rate</h3>
        <p id="interest-rate-value">--</p>
      </div>

      <div class="card">
        <h3>Debt-to-GDP</h3>
        <p id="debt-to-gdp-value">--</p>
      </div>

      <div class="card">
        <h3>Risk Score</h3>
        <p id="risk-score-value">--</p>
      </div>

      <div class="card">
        <h3>Risk Level</h3>
        <p id="risk-level-value">--</p>
      </div>
      
    </section>

    <!-- Chart Placeholder -->
    <section id="charts">
      <h2>Trends</h2>
      <div class="chart-placeholder">Chart will go here</div>
    </section>

  </main>

  <script src="src/js/main.js"></script>
</body>
</html>
